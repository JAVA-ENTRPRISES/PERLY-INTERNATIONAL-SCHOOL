<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Pearly International School</title>
    <link rel="icon" type="image/png" href="images/log.png">
    <link
      rel="icon"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- tailwindcss -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div id="header"></div>

    <main class="w-full">
      <!-- page header -->
      <section class="py-14">
        <div class="max-w-7xl mx-auto px-4 text-center">
          <h1 class="text-3xl md:text-4xl font-bold">Contact Us</h1>
          <!-- <p class="mt-3 text-blue-100">
            We are here to help you. Get in touch with us.
          </p> -->
        </div>
      </section>

      <!-- contact section -->
      <section class="py-16">
        <div
          class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-10"
        >
          <!-- contact info -->
          <div>
            <h2 class="text-2xl font-bold text-gray-800 mb-6">
              School Contact Details
            </h2>
            <div class="space-y-4 text-gray-700">
              <p class="flex items-start gap-3">
                <i class="fa-solid fa-location-dot mt-1"></i>
                Plot No- 1546, Lane- 4/A, Jagannath Nagar, Bhubaneswar, Odisha
                - 751025
              </p>
              <p class="flex items-center gap-3">
                <i class="fa-solid fa-phone"></i>
                +91 9807546446
              </p>
              <p class="flex items-center gap-3">
                <i class="fa-solid fa-envelope mt-1"></i>
                example@gmail.com
              </p>
            </div>

            <!-- google map -->
            <div class="mt-6 rounded-xl overflow-hidden shadow">
              <iframe class="w-full h-80 border-0" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3742.3852596195993!2d85.86112867469497!3d20.284314512931928!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a190a0990bc8959%3A0xc43dfa453e53c7a8!2sPearly%20International%20School%20%26%20Daycare!5e0!3m2!1sen!2sin!4v1772873938069!5m2!1sen!2sin" loading="lazy"></iframe>
            </div>
          </div>

          <!-- contact form -->
           <div class="bg-white p-6 md:p-8 rounded-2xl shadow">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Send Us a Message</h2>
            <form class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-600">Full Name</label>
                <input
                type="text"
                required
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Enter your name"/>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-600">Email Address</label>
                <input
                type="email"
                required
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Enter your email"/>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-600">Phone Number</label>
                <input
                type="tel"
                required
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Enter your phone number"/>
              </div>

              <div>
              <label class="block text-sm font-medium text-gray-600">
                Message
              </label>
              <textarea
                rows="4"
                required
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Write your message here"
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full bg-[#1F8A4C] hover:bg-[#0F6A3B] text-white font-semibold py-2 rounded-lg transition">
              Submit
            </button>
            </form>
           </div>
        </div>
      </section>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <script src="js/main.js"></script>
  </body>
</html>
